<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>link-to-bio | Links</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        /* CSS Reset & Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #dfb499; 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* 1. Profile Background Section */
        .profile-bg {
            width: 100%;
            height: 50vh; 
            background-image: url('https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'); 
            background-size: cover;
            background-position: center top;
            position: relative;
        }

        .profile-bg::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%; 
            background: linear-gradient(to bottom, transparent, #dfb499);
        }

        /* 2. Main Content Container */
        .content {
            width: 100%;
            max-width: 420px; 
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            z-index: 10;
            margin-top: -30px; 
        }

        .username {
            font-size: 32px;
            font-weight: 700;
            color: #3b3531;
            margin-bottom: 4px; /* Reduced to fit bio closely */
            letter-spacing: -0.5px;
            text-transform: uppercase;
        }

        /* Bio Styling */
        .bio {
            font-size: 15px;
            color: #5a514b;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 400;
            max-width: 85%;
            line-height: 1.4;
        }

        .social-icons {
            display: flex;
            gap: 22px;
            margin-bottom: 35px;
        }

        .social-icons a {
            color: #3b3531;
            font-size: 24px;
            text-decoration: none;
            transition: transform 0.2s ease, color 0.2s ease;
        }

        .social-icons a:hover {
            transform: scale(1.15);
            color: #ffffff;
        }

        /* 3. Link Buttons Container */
        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding-bottom: 40px;
        }

        .link-btn {
            background-color: #ffffff;
            color: #3b3531;
            text-decoration: none;
            padding: 18px 24px;
            border-radius: 50px; 
            display: flex;
            align-items: center;
            font-size: 16px;
            font-weight: 500;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.03);
        }

        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
        }

        .link-btn i {
            font-size: 24px;
            width: 35px; 
            color: #423b38;
            display: flex;
            justify-content: center;
        }

        .link-btn span {
            flex-grow: 1;
            text-align: center;
            padding-right: 35px; 
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="profile-bg"></div>

    <div class="content">
        
        <h1 class="username">MANISH KUMAR</h1>
        
        <p class="bio">Web Developer & UI/UX Designer. Creating modern digital experiences.</p>

        <div class="social-icons">
            <a href="https://instagram.com/manish.io_" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" title="YouTube"><i class="fa-brands fa-youtube"></i></a>
            <a href="#" title="Facebook"><i class="fa-brands fa-facebook"></i></a>
            <a href="#" title="Threads"><i class="fa-brands fa-threads"></i></a>
            <a href="https://wa.me/919693982501" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
            <a href="#" title="Telegram"><i class="fa-brands fa-telegram"></i></a>
        </div>

        <div class="links-container">
            
            <a href="https://instagram.com/manish.io_" class="link-btn">
                <i class="fa-brands fa-instagram"></i>
                <span>Instagram</span>
            </a>

            <a href="#" class="link-btn">
                <i class="fa-brands fa-youtube"></i>
                <span>YouTube</span>
            </a>

            <a href="#" class="link-btn">
                <i class="fa-brands fa-facebook"></i>
                <span>Facebook</span>
            </a>

            <a href="#" class="link-btn">
                <i class="fa-brands fa-threads"></i>
                <span>Threads</span>
            </a>

            <a href="https://wa.me/919693982501" class="link-btn">
                <i class="fa-brands fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>

            <a href="#" class="link-btn">
                <i class="fa-brands fa-telegram"></i>
                <span>Telegram</span>
            </a>

        </div>
    </div>

</body>
</html>
